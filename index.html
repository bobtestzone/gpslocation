<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="離線 GPS">
    <title>離線 GPS</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel" aria-label="目前 GPS 狀態">
        <div>
          <div class="status-line">
            <p class="eyebrow">目前位置</p>
            <span id="networkStatus" class="network-status">檢查網路</span>
          </div>
          <h1 id="statusTitle">等待定位</h1>
        </div>
        <button class="icon-button" id="refreshBtn" type="button" aria-label="重新定位" title="重新定位">
          <span aria-hidden="true">&#8635;</span>
        </button>
      </section>

      <nav class="view-tabs" aria-label="主要頁面">
        <button id="recordTabBtn" type="button" class="is-active">記錄</button>
        <button id="historyTabBtn" type="button">歷史</button>
      </nav>

      <div id="recordView">

      <section class="coordinate-panel" aria-label="座標">
        <div class="coord-row">
          <span>緯度</span>
          <strong id="lat">--</strong>
        </div>
        <div class="coord-row">
          <span>經度</span>
          <strong id="lng">--</strong>
        </div>
      </section>

      <section class="metrics-grid" aria-label="定位數據">
        <article>
          <span>精度</span>
          <strong id="accuracy">--</strong>
        </article>
        <article>
          <span>海拔</span>
          <strong id="altitude">--</strong>
        </article>
        <article>
          <span>速度</span>
          <strong id="speed">--</strong>
        </article>
        <article>
          <span>航向</span>
          <strong id="heading">--</strong>
        </article>
      </section>

      <section class="recorder-panel" aria-label="健行記錄">
        <label class="record-name-label" for="recordName">紀錄名稱</label>
        <input id="recordName" class="record-name-input" type="text" maxlength="40" placeholder="例如：合歡山北峰">
        <button id="recordBtn" type="button" class="record-button" aria-label="開始或停止記錄">
          <span id="recordIcon" aria-hidden="true">▶</span>
          <span id="recordLabel">開始記錄</span>
        </button>
        <div class="record-stats">
          <article>
            <span>狀態</span>
            <strong id="recordStatus">未記錄</strong>
          </article>
          <article>
            <span>時間</span>
            <strong id="elapsedTime">00:00:00</strong>
          </article>
          <article>
            <span>距離</span>
            <strong id="recordDistance">0 m</strong>
          </article>
          <article>
            <span>爬升</span>
            <strong id="elevationGain">0 m</strong>
          </article>
        </div>
      </section>

      <section class="track-panel" aria-label="地圖與移動軌跡">
        <div class="section-heading">
          <h2>地圖與軌跡</h2>
          <span id="pointCount">0 點</span>
        </div>
        <div class="map-viewport" id="mapViewport">
          <div class="tile-layer" id="tileLayer" aria-hidden="true"></div>
          <canvas id="trackCanvas" width="720" height="520"></canvas>
          <div class="map-controls" aria-label="地圖控制">
            <button id="zoomInBtn" type="button" aria-label="放大地圖" title="放大">+</button>
            <button id="zoomOutBtn" type="button" aria-label="縮小地圖" title="縮小">-</button>
            <button id="centerMapBtn" type="button" aria-label="回到目前位置" title="回到目前位置">◎</button>
          </div>
          <div class="map-mode" id="mapMode">線上地圖</div>
          <a class="map-attribution" href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">
            © OpenStreetMap contributors
          </a>
        </div>
      </section>

      <section class="actions" aria-label="操作">
        <button id="copyBtn" type="button">複製 GPS</button>
        <button id="shareBtn" type="button">分享</button>
        <button id="exportBtn" type="button">匯出 GPX</button>
        <button id="clearBtn" type="button" class="secondary">清除記錄</button>
      </section>

      <p class="notice" id="installHint">
        按「開始記錄」後才會把 GPS、時間、海拔與軌跡存到手機裡。有網路時顯示 OpenStreetMap 底圖；離線時仍可記錄 GPS 與匯出 GPX。
      </p>
      </div>

      <section id="historyView" class="history-panel is-hidden" aria-label="歷史記錄">
        <div class="section-heading">
          <h2>歷史記錄</h2>
          <span id="historyCount">0 筆</span>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
